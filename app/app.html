      try {
        var build = document.querySelector('meta[name="app-build"]').content;

          params.set('v', build);
          var newUrl = location.pathname + '?' + params.toString() + location.hash;
          // 履歴だけ置き換え（リロードループを避ける）

    const languageNames = { ja: '日本語', en: 'English', 'zh-TW': '繁體中文' };

    const shuffleArray = (arr) => {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    };

    // ===== 語言選擇 =====

      return (

    // ===== 角色展示 =====

        <>

            <img src={src} alt={alt} className={className} />

          {zoomed && (
            <div
              className="fixed inset-0 z-[10000] flex items-center justify-center p-4 animate-fadeIn"
              style={{ background: 'rgba(0,0,0,0.85)', cursor: 'zoom-out' }}
              onClick={() => setZoomed(false)}

              <img
                src={src}
                alt={alt}
                className="rounded-lg shadow-2xl"
                style={{ maxWidth: '95vw', maxHeight: '90vh', objectFit: 'contain' }}

              <button
                onClick={() => setZoomed(false)}
                className="absolute top-3 right-3 w-11 h-11 bg-white/20 hover:bg-white/40 rounded-full flex items-center justify-center text-white text-xl backdrop-blur-sm transition"

                タップして閉じる
              </div>
            </div>

      );
    };

    // ===== かるた遊び =====
    const KarutaGame = ({ t, onBack, filterEra }) => {
      const [state, setState] = useState('select');
      const [difficulty, setDifficulty] = useState(12);
      const [cards, setCards] = useState([]);
      const [idx, setIdx] = useState(0);
      const [choices, setChoices] = useState([]);
      const [score, setScore] = useState(0);
      const [combo, setCombo] = useState(0);
      const [feedback, setFeedback] = useState(null);
      const [selected, setSelected] = useState(null);
      const [timer, setTimer] = useState(0);
      const timerRef = useRef(null);

      const startGame = (num) => {
        let pool = filterEra ? allCards.filter(c => c.era === filterEra) : allCards;
        const shuffled = shuffleArray(pool).slice(0, Math.min(num, pool.length));
        setCards(shuffled);
        setDifficulty(num);
        setIdx(0);
        setScore(0);
        setCombo(0);
        setTimer(0);
        setState('playing');
        genChoices(shuffled, 0);
        timerRef.current = setInterval(() => setTimer(t => t + 1), 1000);
      };

      const genChoices = (list, i) => {
        const correct = list[i];
        const others = shuffleArray(allCards.filter(c => c.id !== correct.id)).slice(0, 5);
        setChoices(shuffleArray([correct, ...others]));
      };

      const handleChoice = (card) => {
        const correct = cards[idx];
        setSelected(card.id);
        if (card.id === correct.id) {
          setScore(s => s + 100 + combo * 20);
          setCombo(c => c + 1);
          setFeedback('correct');
          setTimeout(() => {
            if (idx + 1 >= cards.length) {
              clearInterval(timerRef.current);
              setState('complete');
            } else {
              setIdx(i => i + 1);
              genChoices(cards, idx + 1);
            }
            setFeedback(null);
            setSelected(null);
          }, 700);
        } else {
          setCombo(0);
          setFeedback('wrong');
          setTimeout(() => { setFeedback(null); setSelected(null); }, 400);
        }
      };

      useEffect(() => () => clearInterval(timerRef.current), []);

      if (state === 'select') {
        const pool = filterEra ? allCards.filter(c => c.era === filterEra) : allCards;
        const maxCards = pool.length;
        return (
          <div className="animate-fadeIn text-center py-6">
            <h2 className="text-2xl font-bold mb-2">🎴 {t.karuta}</h2>
            {filterEra && <p className="text-gray-500 mb-4">{filterEra}時代 ({maxCards}{t.cards})</p>}
            <p className="text-gray-500 mb-6">{t.selectDifficulty}</p>
            <div className="grid grid-cols-2 gap-3 max-w-sm mx-auto">
              {[[6, t.easy], [12, t.normal], [24, t.hard], [maxCards, t.expert]].map(([num, label]) => (
                num <= maxCards && (
                  <button key={num} onClick={() => startGame(num)}
                    className="bg-gradient-to-br from-red-500 to-red-600 text-white py-4 px-4 rounded-xl font-bold hover:from-red-600 hover:to-red-700 transition card-shadow">
                    {label} ({num}{t.cards})
                  </button>
                )
              ))}
            </div>
            <button onClick={onBack} className="mt-6 text-gray-500 hover:text-gray-700">{t.back}</button>
          </div>
        );
      }

      if (state === 'complete') {
        return (
          <div className="animate-fadeIn text-center py-6">
            <div className="text-5xl mb-4">🎉</div>
            <h2 className="text-2xl font-bold mb-4">{t.complete}</h2>
            <div className="text-4xl font-bold text-red-600 mb-2">{score}</div>
            <p className="text-gray-500 mb-6">{t.time}: {Math.floor(timer/60)}:{(timer%60).toString().padStart(2,'0')}</p>
            <div className="flex gap-3 justify-center">
              <button onClick={() => startGame(difficulty)} className="bg-red-600 text-white px-5 py-2 rounded-xl font-bold hover:bg-red-700">{t.restart}</button>
              <button onClick={onBack} className="bg-gray-200 px-5 py-2 rounded-xl font-bold hover:bg-gray-300">{t.back}</button>
            </div>
          </div>
        );
      }

      const cur = cards[idx];
      return (
        <div className="animate-fadeIn">
          <div className="flex justify-between items-center mb-3 bg-white rounded-xl p-3 shadow text-sm max-w-md mx-auto">
            <span className="font-bold">{t.score}: <span className="text-red-600">{score}</span></span>
            <span className="font-bold">{t.combo}: <span className="text-orange-500">{combo}</span></span>
            <span className="text-gray-500">{idx + 1}/{cards.length}</span>
            <span className="font-mono">{Math.floor(timer/60)}:{(timer%60).toString().padStart(2,'0')}</span>
          </div>
          <div className="text-center mb-4">
            <p className="text-xs text-gray-500 mb-2">📖 読み札 <span className="text-gray-400">（タップで拡大）</span></p>
            <ZoomableImage
              src={getCardImage(cur, 'front')}
              alt={cur.kana}
              wrapperClassName={`inline-block rounded-xl overflow-hidden card-shadow border-4 ${colorMap[cur.color].border} ${feedback === 'correct' ? 'animate-correct' : ''}`}
              className="h-64 md:h-56 w-auto"
            />
          </div>
          <p className="text-center font-bold mb-3">👇 {t.findCard}</p>
          {feedback && <div className={`text-center text-xl font-bold mb-3 ${feedback === 'correct' ? 'text-green-500' : 'text-red-500'}`}>{feedback === 'correct' ? t.correct : t.wrong}</div>}
          <div className="grid grid-cols-3 md:grid-cols-6 gap-2 max-w-2xl mx-auto">
            {choices.map(c => (
              <div key={c.id} onClick={() => !feedback && handleChoice(c)}
                className={`game-card rounded-lg overflow-hidden border-3 ${colorMap[c.color].border} ${selected === c.id ? (feedback === 'correct' ? 'correct border-green-500' : 'wrong border-red-500') : ''}`}
                style={{ borderWidth: '3px' }}>
                <img src={getCardImage(c, 'back')} alt={c.kana} className="w-full" />
              </div>
            ))}
          </div>
          <button onClick={onBack} className="mt-4 text-gray-500 hover:text-gray-700 block mx-auto text-sm">{t.back}</button>
        </div>
      );
    };

    // ===== 神経衰弱 =====
    const MemoryGame = ({ t, onBack, filterEra }) => {
      const [state, setState] = useState('select');
      const [difficulty, setDifficulty] = useState(6);
      const [cards, setCards] = useState([]);
      const [flipped, setFlipped] = useState([]);
      const [matched, setMatched] = useState([]);
      const [tries, setTries] = useState(0);
      const [canFlip, setCanFlip] = useState(true);

      const startGame = (numPairs) => {
        let pool = filterEra ? allCards.filter(c => c.era === filterEra) : allCards;
        const selected = shuffleArray(pool).slice(0, Math.min(numPairs, pool.length));
        const gameCards = shuffleArray([
          ...selected.map(c => ({ ...c, uid: c.id + '_front', type: 'front' })),
          ...selected.map(c => ({ ...c, uid: c.id + '_back', type: 'back' })),
        ]);
        setCards(gameCards);
        setFlipped([]);
        setMatched([]);
        setTries(0);
        setDifficulty(numPairs);
        setState('playing');
      };

      const handleFlip = (index) => {
        if (!canFlip || flipped.includes(index) || matched.includes(cards[index].id)) return;
        const newFlipped = [...flipped, index];
        setFlipped(newFlipped);
        if (newFlipped.length === 2) {
          setCanFlip(false);
          setTries(t => t + 1);
          const [first, second] = newFlipped;
          if (cards[first].id === cards[second].id && cards[first].type !== cards[second].type) {
            setMatched(m => [...m, cards[first].id]);
            setFlipped([]);
            setCanFlip(true);
          } else {
            setTimeout(() => { setFlipped([]); setCanFlip(true); }, 800);
          }
        }
      };

      const isComplete = matched.length === difficulty;

      if (state === 'select') {
        const pool = filterEra ? allCards.filter(c => c.era === filterEra) : allCards;
        const maxPairs = pool.length;
        return (
          <div className="animate-fadeIn text-center py-6">
            <h2 className="text-2xl font-bold mb-2">🧠 {t.memory}</h2>
            {filterEra && <p className="text-gray-500 mb-4">{filterEra}時代</p>}
            <p className="text-gray-500 mb-6">{t.selectDifficulty}</p>
            <div className="grid grid-cols-2 gap-3 max-w-sm mx-auto">
              {[[4, '4'], [6, '6'], [8, '8'], [Math.min(12, maxPairs), Math.min(12, maxPairs)]].map(([num, label]) => (
                num <= maxPairs && (
                  <button key={num} onClick={() => startGame(num)}
                    className="bg-gradient-to-br from-blue-500 to-blue-600 text-white py-4 px-4 rounded-xl font-bold hover:from-blue-600 hover:to-blue-700 transition card-shadow">
                    {label} {t.pairs}
                  </button>
                )
              ))}
            </div>
            <button onClick={onBack} className="mt-6 text-gray-500 hover:text-gray-700">{t.back}</button>
          </div>
        );
      }

      if (isComplete) {
        return (
          <div className="animate-fadeIn text-center py-6">
            <div className="text-5xl mb-4">🎊</div>
            <h2 className="text-2xl font-bold mb-4">{t.complete}</h2>
            <p className="text-xl mb-6">{t.tries}: <span className="font-bold text-blue-600">{tries}</span></p>
            <div className="flex gap-3 justify-center">
              <button onClick={() => startGame(difficulty)} className="bg-blue-600 text-white px-5 py-2 rounded-xl font-bold hover:bg-blue-700">{t.restart}</button>
              <button onClick={onBack} className="bg-gray-200 px-5 py-2 rounded-xl font-bold hover:bg-gray-300">{t.back}</button>
            </div>
          </div>
        );
      }

      return (
        <div className="animate-fadeIn">
          <div className="flex justify-between items-center mb-3 bg-white rounded-xl p-3 shadow text-sm max-w-md mx-auto">
            <span className="font-bold">{t.tries}: {tries}</span>
            <span className="text-gray-500">{t.pairs}: {matched.length}/{difficulty}</span>
          </div>
          <p className="text-center font-bold mb-3">🔍 {t.matchPairs}</p>
          <div className={`grid gap-2 mx-auto ${
            difficulty <= 4 ? 'grid-cols-4 max-w-xs' :
            difficulty <= 6 ? 'grid-cols-4 max-w-sm' :
            difficulty <= 8 ? 'grid-cols-4 max-w-sm' :
            'grid-cols-6 max-w-md'
          }`}>
            {cards.map((card, index) => {
              const isFlipped = flipped.includes(index) || matched.includes(card.id);
              return (
                <div key={card.uid} onClick={() => handleFlip(index)}
                  className={`aspect-[2/3] rounded-lg overflow-hidden cursor-pointer transition border-2 ${matched.includes(card.id) ? 'opacity-40 border-green-400' : 'border-gray-300 hover:border-gray-400'}`}>
                  {isFlipped ? (
                    <img src={getCardImage(card, card.type)} alt="" className="w-full h-full object-contain bg-white" />
                  ) : (
                    <div className="w-full h-full bg-gradient-to-br from-red-600 to-red-700 flex items-center justify-center">
                      <span className="text-white text-xl md:text-2xl font-bold">?</span>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <button onClick={onBack} className="mt-4 text-gray-500 hover:text-gray-700 block mx-auto text-sm">{t.back}</button>
        </div>
      );
    };

    // ===== 時代クイズ =====
    const EraQuiz = ({ t, onBack, filterEra }) => {
      const [state, setState] = useState('select');
      const [questions, setQuestions] = useState([]);
      const [idx, setIdx] = useState(0);
      const [score, setScore] = useState(0);
      const [feedback, setFeedback] = useState(null);
      const [selectedAns, setSelectedAns] = useState(null);

      const startGame = (num) => {
        let pool = filterEra ? allCards.filter(c => c.era === filterEra) : allCards;
        const q = shuffleArray(pool).slice(0, Math.min(num, pool.length)).map(card => ({
          card,
          options: shuffleArray([card.era, ...shuffleArray(eraList.filter(e => e !== card.era)).slice(0, 3)])
        }));
        setQuestions(q);
        setIdx(0);
        setScore(0);
        setState('playing');
      };

      const handleAnswer = (answer) => {
        const correct = questions[idx].card.era;
        setSelectedAns(answer);
        if (answer === correct) {
          setScore(s => s + 1);
          setFeedback('correct');
        } else {
          setFeedback('wrong');
        }
        setTimeout(() => {
          if (idx + 1 >= questions.length) setState('complete');
          else setIdx(i => i + 1);
          setFeedback(null);
          setSelectedAns(null);
        }, 800);
      };

      if (state === 'select') {
        const pool = filterEra ? allCards.filter(c => c.era === filterEra) : allCards;
        const maxQ = pool.length;
        return (
          <div className="animate-fadeIn text-center py-6">
            <h2 className="text-2xl font-bold mb-2">📚 {t.quiz}</h2>
            {filterEra && <p className="text-gray-500 mb-4">{filterEra}時代</p>}
            <p className="text-gray-500 mb-6">{t.selectDifficulty}</p>
            <div className="grid grid-cols-2 gap-3 max-w-sm mx-auto">
              {[[5, '5'], [10, '10'], [20, '20'], [maxQ, maxQ]].map(([num, label]) => (
                num <= maxQ && (
                  <button key={num} onClick={() => startGame(num)}
                    className="bg-gradient-to-br from-green-500 to-green-600 text-white py-4 px-4 rounded-xl font-bold hover:from-green-600 hover:to-green-700 transition card-shadow">
                    {label}{t.questions}
                  </button>
                )
              ))}
            </div>
            <button onClick={onBack} className="mt-6 text-gray-500 hover:text-gray-700">{t.back}</button>
          </div>
        );
      }

      if (state === 'complete') {
        const pct = Math.round((score / questions.length) * 100);
        return (
          <div className="animate-fadeIn text-center py-6">
            <div className="text-5xl mb-4">{pct >= 80 ? '🏆' : pct >= 50 ? '👍' : '📖'}</div>
            <h2 className="text-2xl font-bold mb-4">{t.complete}</h2>
            <div className="text-4xl font-bold text-green-600 mb-2">{score}/{questions.length}</div>
            <p className="text-gray-500 mb-6">{pct}%</p>
            <div className="flex gap-3 justify-center">
              <button onClick={() => startGame(questions.length)} className="bg-green-600 text-white px-5 py-2 rounded-xl font-bold hover:bg-green-700">{t.restart}</button>
              <button onClick={onBack} className="bg-gray-200 px-5 py-2 rounded-xl font-bold hover:bg-gray-300">{t.back}</button>
            </div>
          </div>
        );
      }

      const q = questions[idx];
      return (
        <div className="animate-fadeIn">
          <div className="flex justify-between items-center mb-3 bg-white rounded-xl p-3 shadow text-sm max-w-md mx-auto">
            <span className="font-bold">{t.score}: <span className="text-green-600">{score}</span></span>
            <span className="text-gray-500">{idx + 1}/{questions.length}</span>
          </div>
          <div className="text-center mb-4">
            <ZoomableImage
              src={getCardImage(q.card, 'front')}
              alt=""
              wrapperClassName={`inline-block rounded-xl overflow-hidden card-shadow border-4 ${colorMap[q.card.color].border}`}
              className="h-64 md:h-56 w-auto"
            />
            <p className="text-xs text-gray-400 mt-2">タップで拡大</p>
          </div>
          <p className="text-center font-bold mb-3">❓ {t.whatEra}</p>
          {feedback && <div className={`text-center text-lg font-bold mb-3 ${feedback === 'correct' ? 'text-green-500' : 'text-red-500'}`}>{feedback === 'correct' ? t.correct : `${t.wrong} → ${displayEra(q.card.era)}`}</div>}
          <div className="grid grid-cols-2 gap-2 max-w-md mx-auto">
            {q.options.map(opt => (
              <button key={opt} onClick={() => !feedback && handleAnswer(opt)} disabled={!!feedback}
                className={`py-3 px-3 rounded-xl font-bold transition text-sm ${selectedAns === opt ? (opt === q.card.era ? 'bg-green-500 text-white' : 'bg-red-500 text-white') : feedback && opt === q.card.era ? 'bg-green-500 text-white' : 'bg-white hover:bg-gray-100 border-2 border-gray-200'}`}>
                {displayEra(opt)}
              </button>
            ))}
          </div>
          <button onClick={onBack} className="mt-4 text-gray-500 hover:text-gray-700 block mx-auto text-sm">{t.back}</button>
        </div>
      );
    };

    // ===== Card Browser =====
    const CardBrowser = ({ t }) => {
      const [color, setColor] = useState(null);
      const [flippedIds, setFlippedIds] = useState({});
      const filtered = color ? allCards.filter(c => c.color === color) : allCards;
      const toggleFlip = (id) => setFlippedIds(prev => ({ ...prev, [id]: !prev[id] }));
      return (
        <div className="animate-fadeIn">
          <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
            <div className="flex items-center gap-2">
              <span className="text-sm font-medium">{t.color}:</span>
              <button onClick={() => setColor(null)} className={`px-3 py-1 rounded text-sm ${!color ? 'bg-gray-800 text-white' : 'bg-gray-200'}`}>{t.all}</button>
              {Object.entries(colorMap).map(([k, v]) => (
                <button key={k} onClick={() => setColor(k)} className={`w-7 h-7 rounded ${v.bg} ${v.border} border-2 ${color === k ? 'ring-2 ring-offset-1 ring-gray-400' : ''}`} title={v.name} />
              ))}
            </div>
            <span className="text-sm text-gray-500">{filtered.length}/48</span>
          </div>
          <div className="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-2">
            {filtered.map(card => (
              <div
                key={card.id}
                onClick={() => toggleFlip(card.id)}
                className={`flip-card-outer rounded-lg overflow-hidden border-2 ${colorMap[card.color].border} card-hover transition cursor-pointer ${flippedIds[card.id] ? 'flipped' : ''}`}
              >
                <div className="flip-card-inner">
                  <img src={getCardImage(card, 'front')} alt={card.kana} className="flip-card-face w-full" />
                  <img src={getCardImage(card, 'back')} alt={card.kana + ' 裏'} className="flip-card-face flip-card-back w-full absolute inset-0" />
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // ===== 学習モード =====
    const LearningMode = ({ t }) => {
      const [selectedEra, setSelectedEra] = useState(null);
      const [selectedCard, setSelectedCard] = useState(null);

      if (selectedCard) {
        return <CardDetail card={selectedCard} setSelectedCard={setSelectedCard} onBack={() => setSelectedCard(null)} />;
      }

      if (selectedEra) {
        return <EraStory era={selectedEra} setSelectedEra={setSelectedEra} setSelectedCard={setSelectedCard} onBack={() => setSelectedEra(null)} />;
      }

      return (
        <div className="animate-fadeIn">
          <div className="text-center mb-5">
            <h2 className="text-xl md:text-2xl font-bold mb-1">時代別ものがたり</h2>
            <p className="text-sm text-gray-600">時代を選んで、日本の歴史を旅しよう！</p>
          </div>

          <div className="relative max-w-xl mx-auto pl-12 md:pl-14">
            {/* 縦の時間軸ライン */}
            <div className="absolute left-5 md:left-6 top-2 bottom-2 w-0.5 bg-gradient-to-b from-amber-300 via-orange-300 to-red-300"></div>

            {eraList.map((era, idx) => {
              const story = eraStories[era] || {};
              const cardsInEra = allCards.filter(c => c.era === era);
              const c = story.color || 'red';
              const available = !story.comingSoon;
              return (
                <div key={era} className="relative mb-4 last:mb-0">
                  {/* ドット */}
                  <div className={`absolute -left-12 md:-left-14 top-4 w-9 h-9 md:w-10 md:h-10 rounded-full ${colorMap[c].bg} ${colorMap[c].border} border-4 flex items-center justify-center shadow`}>
                    <span className="text-xs font-bold text-gray-700">{idx + 1}</span>
                  </div>
                  {/* 時代カード */}
                  <button onClick={() => setSelectedEra(era)}
                    className={`w-full text-left bg-white rounded-xl p-3 md:p-4 shadow hover:shadow-lg transition border-2 ${colorMap[c].border} ${available ? 'card-hover' : 'opacity-70'}`}>
                    <div className="flex items-center justify-between mb-1">
                      <div className="flex items-center gap-2">
                        <span className="text-xl md:text-2xl">{story.emoji}</span>
                        <h3 className="text-base md:text-lg font-bold">{displayEra(era)}</h3>
                      </div>
                      {!available && <span className="text-[10px] text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full">準備中</span>}
                    </div>
                    <p className="text-xs text-gray-500 mb-2">{story.years}</p>
                    <div className="flex flex-wrap gap-1">
                      {cardsInEra.map(card => (
                        <span key={card.id} className={`w-7 h-7 md:w-8 md:h-8 ${colorMap[card.color].bg} rounded flex items-center justify-center text-sm font-bold ${colorMap[card.color].text}`}>
                          {card.kana}
                        </span>
                      ))}
                    </div>
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    // ===== 時代ストーリーページ =====
    const EraStory = ({ era, setSelectedEra, setSelectedCard, onBack }) => {
      const story = eraStories[era] || {};
      const cardsInEra = allCards.filter(c => c.era === era);
      const currentIdx = eraList.indexOf(era);
      const prevEra = currentIdx > 0 ? eraList[currentIdx - 1] : null;
      const nextEra = currentIdx < eraList.length - 1 ? eraList[currentIdx + 1] : null;
      const c = story.color || 'red';
      const mc = story.mascotColor || c;

      return (
        <div className="animate-fadeIn max-w-2xl mx-auto">
          <button onClick={onBack} className="flex items-center gap-1 text-sm text-gray-600 hover:text-gray-900 mb-3">
            ← 時代一覧に戻る
          </button>

          <div className={`rounded-2xl overflow-hidden shadow-lg bg-white border-2 ${colorMap[c].border}`}>
            {/* ヘッダー */}
            <div className={`${colorMap[c].bg} px-5 py-4`}>
              <div className="flex items-center gap-2 mb-1">
                <span className="text-2xl md:text-3xl">{story.emoji}</span>
                <h2 className="text-xl md:text-2xl font-bold">{displayEra(era)}</h2>
              </div>
              <p className="text-xs md:text-sm text-gray-700">{story.years}</p>
            </div>

            {/* 本文 */}
            <div className="px-5 py-5">
              {story.comingSoon ? (
                <div className="text-center py-10 text-gray-400">
                  <div className="text-5xl mb-3">🚧</div>
                  <p className="text-base">この時代の物語は準備中...</p>
                  <p className="text-xs mt-1">もうしばらくお待ちください</p>
                </div>
              ) : (
                <>
                  {story.sections.map((sec, i) => (
                    <div key={i} className="mb-5 last:mb-3">
                      <h3 className={`font-bold mb-2 ${colorMap[c].text} text-base md:text-lg`}>
                        {sec.title}
                      </h3>
                      <p className="text-sm md:text-base leading-relaxed text-gray-700 whitespace-pre-line">
                        {sec.content}
                      </p>
                    </div>
                  ))}
                  {story.mascotComment && (
                    <div className={`mt-4 ${colorMap[mc].bg} p-3 rounded-xl border-l-4 ${colorMap[mc].border} flex gap-2 items-start`}>
                      <span className="text-lg">💭</span>
                      <p className="text-sm text-gray-800">いろはくん：「{story.mascotComment}」</p>
                    </div>
                  )}
                </>
              )}

              {/* 関連カルタ */}
              {cardsInEra.length > 0 && (
                <div className="mt-6 border-t pt-4">
                  <h4 className="text-sm font-bold mb-3 text-gray-600">📇 このカルタで覚えよう <span className="text-xs font-normal text-gray-400">（タップで解説）</span></h4>
                  <div className="flex gap-2 overflow-x-auto pb-2">
                    {cardsInEra.map(card => (
                      <button key={card.id} onClick={() => setSelectedCard && setSelectedCard(card)}
                        className="flex-shrink-0 hover:scale-105 transition">
                        <img src={getCardImage(card, 'front')} alt={card.kana}
                          className={`h-28 md:h-36 w-auto rounded-lg border-2 ${colorMap[card.color].border} shadow-sm hover:shadow-md`} />
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* 前後ナビゲーション */}
          <div className="flex justify-between items-center mt-4 gap-2">
            {prevEra ? (
              <button onClick={() => setSelectedEra(prevEra)}
                className="px-3 py-2 bg-white rounded-xl shadow text-xs md:text-sm hover:shadow-md transition flex-1 text-left">
                <div className="text-[10px] text-gray-400">前の時代</div>
                <div className="font-bold">← {prevEra}時代</div>
              </button>
            ) : <div className="flex-1"></div>}
            {nextEra ? (
              <button onClick={() => setSelectedEra(nextEra)}
                className="px-3 py-2 bg-white rounded-xl shadow text-xs md:text-sm hover:shadow-md transition flex-1 text-right">
                <div className="text-[10px] text-gray-400">次の時代</div>
                <div className="font-bold">{nextEra}時代 →</div>
              </button>
            ) : <div className="flex-1"></div>}
          </div>
        </div>
      );
    };

    // ===== カード別解説ページ =====
    const CardDetail = ({ card, setSelectedCard, onBack }) => {
      const story = cardStories[card.id] || {};
      const cardIdx = allCards.findIndex(c => c.id === card.id);
      const prevCard = cardIdx > 0 ? allCards[cardIdx - 1] : null;
      const nextCard = cardIdx < allCards.length - 1 ? allCards[cardIdx + 1] : null;
      const c = card.color;

      return (
        <div className="animate-fadeIn max-w-2xl mx-auto">
          <button onClick={onBack} className="flex items-center gap-1 text-sm text-gray-600 hover:text-gray-900 mb-3">
            ← {displayEra(card.era)}に戻る
          </button>

          <div className={`rounded-2xl overflow-hidden shadow-lg bg-white border-2 ${colorMap[c].border}`}>
            {/* ヘッダー：カード画像 + タイトル */}
            <div className={`${colorMap[c].bg} px-4 md:px-5 py-4`}>
              <div className="flex items-start gap-3">
                <ZoomableImage
                  src={getCardImage(card, 'front')}
                  alt={card.kana}
                  wrapperClassName={`flex-shrink-0 rounded-lg border-2 ${colorMap[c].border} shadow overflow-hidden`}
                  className="h-32 md:h-44 w-auto"
                />
                <div className="flex-1 min-w-0">
                  <div className="flex items-baseline gap-2 flex-wrap mb-1">
                    <span className={`text-3xl md:text-4xl font-bold ${colorMap[c].text}`}>「{card.kana}」</span>
                    <span className="text-xs md:text-sm text-gray-600">{displayEra(card.era)}</span>
                  </div>
                  {story.title && (
                    <h2 className="text-base md:text-lg font-bold mt-2 leading-tight">{story.title}</h2>
                  )}
                  {story.summary && (
                    <p className="text-xs text-gray-600 mt-1 italic">「{story.summary}」</p>
                  )}
                </div>
              </div>
            </div>

            {/* 本文 */}
            <div className="px-5 py-5">
              {story.comingSoon || !story.sections ? (
                <div className="text-center py-10 text-gray-400">
                  <div className="text-5xl mb-3">🚧</div>
                  <p className="text-base">この解説は準備中...</p>
                  <p className="text-xs mt-1">もうしばらくお待ちください</p>
                </div>
              ) : (
                <>
                  {story.sections.map((sec, i) => (
                    <div key={i} className="mb-5 last:mb-2">
                      <h3 className={`font-bold mb-2 ${colorMap[c].text} text-base md:text-lg`}>
                        {sec.title}
                      </h3>
                      <p className="text-sm md:text-base leading-relaxed text-gray-700">
                        {sec.content}
                      </p>
                    </div>
                  ))}
                  {story.keywords && story.keywords.length > 0 && (
                    <div className="mt-4 pt-4 border-t">
                      <h4 className="text-xs font-bold text-gray-500 mb-2">🔑 キーワード</h4>
                      <div className="flex flex-wrap gap-1.5">
                        {story.keywords.map((kw, i) => (
                          <span key={i} className={`text-xs px-2 py-1 rounded-full ${colorMap[c].bg} ${colorMap[c].text} font-medium`}>
                            {kw}
                          </span>
                        ))}
                      </div>
                    </div>
                  )}
                </>
              )}
            </div>
          </div>

          {/* 前後ナビゲーション */}
          <div className="flex justify-between items-center mt-4 gap-2">
            {prevCard ? (
              <button onClick={() => setSelectedCard(prevCard)}
                className="px-3 py-2 bg-white rounded-xl shadow text-xs md:text-sm hover:shadow-md transition flex-1 text-left">
                <div className="text-[10px] text-gray-400">前の札</div>
                <div className="font-bold">← 「{prevCard.kana}」</div>
              </button>
            ) : <div className="flex-1"></div>}
            {nextCard ? (
              <button onClick={() => setSelectedCard(nextCard)}
                className="px-3 py-2 bg-white rounded-xl shadow text-xs md:text-sm hover:shadow-md transition flex-1 text-right">
                <div className="text-[10px] text-gray-400">次の札</div>
                <div className="font-bold">「{nextCard.kana}」 →</div>
              </button>
            ) : <div className="flex-1"></div>}
          </div>
        </div>
      );
    };

    // ===== Game Menu =====
    const GameMenu = ({ t, onSelect }) => {
      return (
        <div className="animate-fadeIn">
          <h2 className="text-xl font-bold text-center mb-6">{t.gameMenu}</h2>
          
          {/* 主要遊戲 */}
          <div className="grid grid-cols-3 gap-3 mb-8 max-w-lg mx-auto">
            <button onClick={() => onSelect('karuta', null)} className="bg-gradient-to-br from-red-500 to-red-600 text-white py-6 px-3 rounded-2xl card-shadow card-hover transition">
              <div className="text-3xl mb-2">🎴</div>
              <div className="font-bold text-sm">{t.karuta}</div>
            </button>
            <button onClick={() => onSelect('memory', null)} className="bg-gradient-to-br from-blue-500 to-blue-600 text-white py-6 px-3 rounded-2xl card-shadow card-hover transition">
              <div className="text-3xl mb-2">🧠</div>
              <div className="font-bold text-sm">{t.memory}</div>
            </button>
            <button onClick={() => onSelect('quiz', null)} className="bg-gradient-to-br from-green-500 to-green-600 text-white py-6 px-3 rounded-2xl card-shadow card-hover transition">
              <div className="text-3xl mb-2">📚</div>
              <div className="font-bold text-sm">{t.quiz}</div>
            </button>
          </div>

          {/* 時代別遊び */}
          <h3 className="text-lg font-bold text-center mb-2">{t.eraGame}</h3>
          <p className="text-center text-gray-500 text-sm mb-4">{t.selectEra}</p>
          <div className="max-w-2xl mx-auto space-y-4">
            {[
              { period: '古代', color: 'red', eras: ['縄文', '弥生', '古墳', '飛鳥', '奈良', '平安'] },
              { period: '中世', color: 'yellow', eras: ['鎌倉', '室町', '戦国'] },
              { period: '近世', color: 'green', eras: ['安土桃山', '江戸前半', '江戸後半'] },
              { period: '近代', color: 'blue', eras: ['明治', '大正'] },
              { period: '現代', color: 'purple', eras: ['昭和', '平成'] }
            ].map(({ period, color, eras }) => (
              <div key={period}>
                <div className={`flex items-center gap-2 mb-2 px-1`}>
                  <span className={`w-2 h-2 rounded-full ${colorMap[color].bg} border ${colorMap[color].border}`}></span>
                  <span className={`text-xs font-bold ${colorMap[color].text}`}>{period}</span>
                  <span className="flex-1 h-px bg-gray-200"></span>
                </div>
                <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-2">
                  {eras.map(era => {
                    const count = allCards.filter(c => c.era === era).length;
                    if (count === 0) return null;
                    return (
                      <button key={era} onClick={() => onSelect('karuta', era)}
                        className={`bg-white border-2 ${colorMap[color].border} hover:${colorMap[color].bg} hover:shadow-md py-3 px-2 rounded-xl transition`}>
                        <div className={`font-bold text-sm ${colorMap[color].text} leading-tight`}>{era === '江戸前半' ? '江戸（前半）' : era === '江戸後半' ? '江戸（後半）' : era}</div>
                        <div className="text-xs text-gray-400 mt-1">{count}{t.cards}</div>
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // ===== Main App =====
    function App() {
      const [lang, setLang] = useState('ja');
      const [tab, setTab] = useState('cards');
      const [showMascot, setShowMascot] = useState(true);
      const [gameMode, setGameMode] = useState(null); // 'karuta', 'memory', 'quiz'
      const [filterEra, setFilterEra] = useState(null);
      
      const t = translations[lang];

      const handleGameSelect = (mode, era) => {
        setGameMode(mode);
        setFilterEra(era);
      };

      const handleBackToMenu = () => {
        setGameMode(null);
        setFilterEra(null);
      };

      const renderContent = () => {
        // 遊戲進行中
        if (tab === 'games' && gameMode) {
          if (gameMode === 'karuta') return <KarutaGame t={t} onBack={handleBackToMenu} filterEra={filterEra} />;
          if (gameMode === 'memory') return <MemoryGame t={t} onBack={handleBackToMenu} filterEra={filterEra} />;
          if (gameMode === 'quiz') return <EraQuiz t={t} onBack={handleBackToMenu} filterEra={filterEra} />;
        }
        
        // 標籤內容
        if (tab === 'cards') return <CardBrowser t={t} />;
        if (tab === 'games') return <GameMenu t={t} onSelect={handleGameSelect} />;
        if (tab === 'learning') return <LearningMode t={t} />;
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-amber-50 via-orange-50 to-red-50">
          {/* Header */}
          <header className="bg-gradient-to-r from-red-700 via-red-800 to-red-900 text-white py-4 px-4 shadow-xl">
            <div className="max-w-5xl mx-auto">
              <div className="flex items-center justify-between mb-3">
                <div>
                  <h1 className="text-2xl md:text-3xl font-bold">{t.title}</h1>
                  <p className="text-red-200 text-xs md:text-sm">{t.subtitle}</p>
                </div>
                <LanguageSelector lang={lang} setLang={setLang} />
              </div>
              <div className="flex gap-2">
                {['cards', 'learning', 'games'].map(key => (
                  <button key={key} onClick={() => { setTab(key); setGameMode(null); setFilterEra(null); }}
                    className={`px-3 md:px-4 py-2 rounded-lg text-xs md:text-sm font-medium transition ${tab === key ? 'bg-white text-red-700' : 'bg-red-600/50 hover:bg-red-600/70'}`}>
                    {key === 'cards' && '🎴'} {key === 'learning' && '📖'} {key === 'games' && '🎮'} {t[key === 'cards' ? 'cardBrowser' : key]}
                  </button>
                ))}
              </div>
            </div>
          </header>

          {/* Mascot */}
          {showMascot && tab !== 'games' && !gameMode && (
            <div className="max-w-5xl mx-auto px-4 py-4">
              <MascotDisplay t={t} />
            </div>
          )}

          {/* Filter Bar */}
          {tab === 'cards' && (
            <div className="bg-white/90 backdrop-blur shadow-md sticky top-0 z-10">
              <div className="max-w-5xl mx-auto px-4 py-3 flex justify-end">
                <button onClick={() => setShowMascot(!showMascot)}
                  className="bg-amber-500 text-white px-3 py-1.5 rounded-lg text-xs md:text-sm hover:bg-amber-600 transition flex items-center gap-1">
                  {showMascot ? '🙈' : '🐣'}
                  <span className="hidden sm:inline">{showMascot ? t.mascotHide : t.mascotShow}</span>
                </button>
              </div>
            </div>
          )}

          {/* Content */}
          <main className="max-w-5xl mx-auto px-4 py-4 md:py-6">
            {renderContent()}
          </main>

          {/* Footer */}
          <footer className="text-center py-6 text-gray-500 text-sm">
            © 松井聰 / いろはde歴史®
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
